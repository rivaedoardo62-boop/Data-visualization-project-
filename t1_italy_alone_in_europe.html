<script>
/* T1 → T5 cross-chart linking. When a country line is clicked, post a
   message to the parent so T5's calculator iframe can pre-select that
   country as the comparator. T5's receiver lives in t5_calculator.html. */
(function () {
  function attach() {
    var gd = document.querySelector('.js-plotly-plot, .plotly-graph-div');
    if (!gd || typeof gd.on !== 'function') return setTimeout(attach, 80);
    var COUNTRY_TO_ISO = {"Italy": "ITA", "Germany": "DEU", "France": "FRA", "Spain": "ESP", "United Kingdom": "GBR", "Sweden": "SWE", "Belgium": "BEL", "Netherlands": "NLD", "Greece": "GRC", "Portugal": "PRT", "OECD": "OECD"};
    gd.style.cursor = 'pointer';
    gd.on('plotly_click', function (data) {
      if (!data || !data.points || !data.points.length) return;
      var country = data.points[0].data.name;
      var iso = COUNTRY_TO_ISO[country];
      // Skip Italy (the baseline) and OECD (aggregate, not a single country)
      if (!iso || iso === 'ITA' || iso === 'OECD') return;
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ event: 't5:set_country', iso3: iso }, '*');
      }
    });
  }
  attach();
})();
</script>
